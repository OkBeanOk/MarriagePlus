# MarriagePlus Main Configuration
language: "EN_US"

settings:
  nsfw-actions-enabled: false
  partner-join-notifications: true


  update-checker:
    enabled: true
    notify-admins-on-join: true

  proposal-expire-seconds: 60
  proposal-cooldown-seconds: 15
  divorce-confirm-seconds: 30

  cooldowns:
    action-seconds: 5
    announce-seconds: 60
    compliment-seconds: 30
    tp-seconds: 30
    home-seconds: 30
    gift-seconds: 2
    backpack-seconds: 2

  default-pronouns:
    subject: "they"
    object: "them"
    possessive: "their"
    display: "they/them"

gui:
  unlocked-material: LIME_DYE
  locked-material: GRAY_DYE
  show-hidden-placeholders: true

titles:
  max-length: 32
  default-format: "&d❤ Married to %partner%"

homes:
  max-homes-default: 3
  max-name-length: 16
  delete-confirm-seconds: 30

nicknames:
  max-length: 24

announcements:
  max-length: 120
  format: "&c❤ &d%player% &7& &d%partner%&7: &f%message%"

xp:
  level-base-required: 100
  level-multiplier: 1.25
  broadcast-level-ups: true
  level-up-broadcast: "&d❤ &f%player% &7& &f%partner% &dreached marriage level &f%level%&d!"
  sources:
    gifts: 15
    chat: 2
    homes: 25
    actions: 5
    anniversaries: 100
    quests: 75
    ceremony: 250
    love-notes: 5
    nearby: 1