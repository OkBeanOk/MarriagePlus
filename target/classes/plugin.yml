name: MarriagePlus
version: '1.4.6-B'
softdepend:
  - PlaceholderAPI
  - LuckPerms
main: com.okbeanok.marriagePlus.MarriagePlus
api-version: '1.21'
load: POSTWORLD

commands:
  marry:
    description: Marriage command
    usage: /marry
    aliases:
      - marriage
      - spouse
  family:
    description: Family tree and adoption command
    usage: /family
    aliases:
      - families
      - fam
      - f
permissions:
  marriageplus.admin:
    description: Allows admin marriage commands
    default: op

  marriageplus.priest:
    description: Allows priest marriage commands
    default: op

  marriageplus.admin.backpack:
    description: Allows inspecting player partner backpacks
    default: op

  marriageplus.command.ring:
    description: Allows wedding ring commands
    default: true

  marriageplus.command.menu:
    description: Allows opening the marriage GUI menu
    default: true

  marriageplus.command.ceremony:
    description: Allows marriage ceremony commands
    default: true

  marriageplus.command.leaderboard:
    description: Allows viewing couple leaderboards
    default: true

  marriageplus.command.family:
    description: Allows use of family and adoption commands.
    default: true

  marriageplus.family.bypass:
    description: Allows bypassing family relationship marriage restrictions
    default: op

  marriageplus.command.me:
    description: Allows sending marriage requests
    default: true

  marriageplus.command.divorce:
    description: Allows divorcing your partner
    default: true

  marriageplus.command.list:
    description: Allows viewing married players
    default: true

  marriageplus.command.partner:
    description: Allows viewing your partner
    default: true

  marriageplus.command.lovenotes:
    description: Allows love note commands
    default: true

  marriageplus.command.status:
    description: Allows viewing marriage status
    default: true

  marriageplus.command.tp:
    description: Allows teleporting to partner
    default: true

  marriageplus.command.home:
    description: Allows couple home commands
    default: true

  marriageplus.command.chat:
    description: Allows marriage chat
    default: true

  marriageplus.command.pvp:
    description: Allows toggling partner PvP
    default: true

  marriageplus.command.actions:
    description: Allows marriage actions like kiss, hug, and cuddle
    default: true

  marriageplus.command.gift:
    description: Allows gifting items to partner
    default: true

  marriageplus.command.backpack:
    description: Allows partner backpack usage
    default: true

  marriageplus.command.anniversary:
    description: Allows viewing marriage anniversary
    default: true

  marriageplus.command.title:
    description: Allows marriage title commands
    default: true

  marriageplus.command.nickname:
    description: Allows partner nickname commands
    default: true

  marriageplus.command.requests:
    description: Allows toggling marriage requests
    default: true

  marriageplus.command.block:
    description: Allows blocking marriage requests from players
    default: true

  marriageplus.command.announce:
    description: Allows sending couple announcements
    default: true

  marriageplus.command.compliment:
    description: Allows sending random couple compliments
    default: true

  marriageplus.command.mail:
    description: Allows partner mail commands
    default: true
    
  marriageplus.command.level:
    description: Allows viewing marriage XP and levels
    default: true

  marriageplus.buffs:
    description: Allows receiving partner buffs
    default: true

  marriageplus.command.profile:
    description: Allows viewing marriage profiles
    default: true

  marriageplus.command.quests:
    description: Allows viewing and claiming couple quests
    default: true