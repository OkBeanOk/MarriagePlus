# MarriagePlus Achievements Configuration
broadcast-unlocks: true
unlock-broadcast: "&d❤ &f%player% &7& &f%partner% &dunlocked achievement: &f%achievement%&d!"

# Logs achievement reward commands/items to the console.
log-rewards: true

definitions:
  first_kiss:
    name: "First Kiss"
    description: "Use /marry kiss for the first time."
    trigger: "action"
    action: "kiss"
    hidden: false

  first_hug:
    name: "First Hug"
    description: "Hug your partner for the first time."
    trigger: "action"
    action: "hug"
    hidden: false

  first_gift:
    name: "First Gift"
    description: "Send your partner your first gift."
    trigger: "gift"
    hidden: false

  first_couple_chat:
    name: "First Couple Chat"
    description: "Send your first private couple chat message."
    trigger: "chat"
    hidden: false

  home_sweet_home:
    name: "Home Sweet Home"
    description: "Set your first couple home."
    trigger: "home"
    hidden: false

  backpack_buddies:
    name: "Backpack Buddies"
    description: "Both partners allow backpack access."
    trigger: "backpack_buddies"
    hidden: false

  anniversary_7:
    name: "7 Day Anniversary"
    description: "Stay married for 7 days."
    trigger: "anniversary"
    days: 7
    hidden: false

  anniversary_30:
    name: "30 Day Anniversary"
    description: "Stay married for 30 days."
    trigger: "anniversary"
    days: 30
    hidden: false

  anniversary_100:
    name: "100 Day Anniversary"
    description: "Stay married for 100 days."
    trigger: "anniversary"
    days: 100
    hidden: false

  anniversary_365:
    name: "One Year Together"
    description: "Stay married for 365 days."
    trigger: "anniversary"
    days: 365
    hidden: false

rewards:
  first_kiss:
    reward-both: true
    commands:
      - "xp add %player% 5 points"
      - "xp add %partner% 5 points"
    items:
      - material: "PINK_TULIP"
        amount: 1
        name: "&dFirst Kiss Flower"
        lore:
          - "&7Awarded to &f%player%"
          - "&7for sharing a first kiss with &f%partner%&7."
          - "&8A sweet little memory."
        enchants:
          unbreaking: 1
        hide-enchants: true

  first_hug:
    reward-both: true
    commands:
      - "xp add %player% 5 points"
      - "xp add %partner% 5 points"
    items:
      - material: "COOKIE"
        amount: 8
        name: "&6Warm Hug Cookies"
        lore:
          - "&7A cozy reward for your first hug."
          - "&7Best shared with &f%partner%&7."
        enchants:
          unbreaking: 1
        hide-enchants: true

  first_gift:
    reward-both: true
    commands:
      - "xp add %player% 10 points"
      - "xp add %partner% 10 points"
    items:
      - material: "CHEST"
        amount: 1
        name: "&6Gift Giver's Keepsake"
        lore:
          - "&7A keepsake for giving your"
          - "&7partner their first gift."
          - "&8Generosity looks good on you."
        enchants:
          unbreaking: 1
        hide-enchants: true
      - material: "DIAMOND"
        amount: 1
        name: "&bShared Sparkle"
        lore:
          - "&7A small sparkle to celebrate"
          - "&7your first exchanged gift."

  first_couple_chat:
    reward-both: true
    commands:
      - "xp add %player% 5 points"
      - "xp add %partner% 5 points"
    items:
      - material: "PAPER"
        amount: 1
        name: "&fPrivate Words"
        lore:
          - "&7Awarded for using couple chat."
          - "&7A quiet message between"
          - "&f%player% &7and &f%partner%&7."
        enchants:
          unbreaking: 1
        hide-enchants: true

  home_sweet_home:
    reward-both: true
    commands:
      - "xp add %player% 15 points"
      - "xp add %partner% 15 points"
    items:
      - material: "RED_BED"
        amount: 1
        name: "&cHome Sweet Home"
        lore:
          - "&7A symbol of the first place"
          - "&7you and &f%partner% &7called home."
        enchants:
          unbreaking: 1
        hide-enchants: true
      - material: "LANTERN"
        amount: 4
        name: "&eCozy Home Lantern"
        lore:
          - "&7Light up your couple home."

  backpack_buddies:
    reward-both: true
    commands:
      - "xp add %player% 15 points"
      - "xp add %partner% 15 points"
    items:
