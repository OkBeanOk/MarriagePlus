# MarriagePlus Ceremony Configuration

enabled: true
# Radius in which your partner must be to start the ceremony
required-radius: 12.0
# Time remaining till offer expires
invite-expire-seconds: 120
# Prevent players from repeatedly starting ceremonies.
cooldown-seconds: 86400
countdown-seconds: 5

broadcast: true
broadcast-message: "&d❤ &f%player% &7and &f%partner% &dcelebrated their marriage ceremony!"

# XP is only awarded once per couple.
reward-xp: 250
reward-once-per-couple: true
give-rings: true

effects:
  enabled: true
  particle: "HEART"
  particle-count: 35
  sound: "ENTITY_FIREWORK_ROCKET_TWINKLE"
  fireworks: true

vows:
  mode: PUBLIC
  random: false
  random-count: 1
  custom-enabled: true
  custom-max-length: 160
  custom-format: "&d%player% vows: &f%message%"

messages:
  vows:
    - "&d%player% &7promises to always stand beside &f%partner%&7."
    - "&d%partner% &7promises to always support &f%player%&7."
    - "&dTogether, they begin another chapter of their story."